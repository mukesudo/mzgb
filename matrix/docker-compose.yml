services:
  synapse-init:
    image: alpine:latest
    container_name: logsnap-synapse-init
    command: ["chown", "-R", "991:991", "/data"]
    volumes:
      - synapse_data:/data
    restart: "no"

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: logsnap-synapse
    restart: unless-stopped
    depends_on:
      synapse-init:
        condition: service_completed_successfully
    environment:
      - SYNAPSE_SERVER_NAME=localhost
      - SYNAPSE_REPORT_STATS=no
      - SYNAPSE_CONFIG_PATH=/config/homeserver.yaml
    volumes:
      - synapse_data:/data
      - ./homeserver.yaml:/config/homeserver.yaml:ro
      - ./log.yaml:/config/log.yaml:ro
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/_matrix/client/versions || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

volumes:
  synapse_data:
