name: mzgb
base: core22
version: '0.3.0'
summary: Fast CLI for filtering very large log files
description: |
  mzgb (mezgeb — "record" in Amharic) is a fast CLI tool for filtering
  and navigating very large log files. Streams line by line — no memory
  issues regardless of file size.

  Filter by log level, regex pattern, or time range. Invert matches with
  --invert, show line numbers with -n, output structured JSON/CSV with
  --output, scan multiple files or globs at once, and decompress .gz/.bz2
  transparently. Auto-detects plaintext, JSON, and logfmt. Works with
  pipes from kubectl, journalctl, cat, jq, and friends.

grade: stable
confinement: classic

apps:
  mzgb:
    command: bin/mzgb

parts:
  mzgb:
    plugin: python
    source: .
    python-requirements:
      - requirements.txt
